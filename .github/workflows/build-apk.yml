name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: checklist-offline

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: |
          npm install @capacitor/android @capacitor/core @capacitor/cli --save
          npm install @capacitor/assets --save-dev

      - name: Remove Android antigo
        run: rm -rf android

      - name: Criar Android
        run: npx cap add android

      - name: Gerar ícone Android
        run: npx capacitor-assets generate --android --assetPath assets

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: checklist-agt-apk
          path: checklist-offline/android/app/build/outputs/apk/debug/app-debug.apk
